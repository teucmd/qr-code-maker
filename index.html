<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Maker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 32px;
        }

        .wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .wrapper {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .form-section {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        select, textarea, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        select:focus, textarea:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .size-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .size-row > div {
            flex: 1;
        }

        .size-row label {
            margin-bottom: 8px;
        }

        .size-row input {
            width: 100%;
        }

        .size-row span {
            color: #999;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .preview-section {
            display: flex;
            flex-direction: column;
        }

        #qrPreview {
            background: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #qrPreview.active {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .placeholder {
            color: #999;
            font-size: 14px;
        }

        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-download, .btn-copy {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }

        .btn-download.show, .btn-copy.show {
            display: block;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #2196F3;
            color: white;
        }

        .btn-copy:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 QR Code Maker</h1>

        <div class="wrapper">
            <div class="form-section">
                <div class="form-group">
                    <label for="inputType">What would you like to encode?</label>
                    <select id="inputType">
                        <option value="text">Text</option>
                        <option value="url">URL/Link</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputData">Enter your content:</label>
                    <textarea id="inputData" placeholder="Enter text or paste a URL...">Hello</textarea>
                </div>

                <div class="form-group">
                    <div class="size-row">
                        <div>
                            <label for="qrSize">QR Code Size:</label>
                            <input type="number" id="qrSize" value="300" min="100" max="800">
                        </div>
                        <span>px</span>
                    </div>
                </div>

                <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>
            </div>

            <div class="preview-section">
                <div id="qrPreview">
                    <div id="qrcode"></div>
                    <p class="placeholder" id="placeholder">Your QR code will appear here</p>
                </div>
                <div class="button-row">
                    <button class="btn-download" id="downloadBtn" onclick="downloadQR()">⬇️ Download</button>
                    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 Copy</button>
                </div>
                <div class="success-message" id="successMessage">✓ Copied to clipboard!</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let lastQRCanvas = null;

        function generateQR() {
            const data = document.getElementById('inputData').value.trim();
            
            if (!data) {
                alert('Please enter some content!');
                return;
            }

            const size = parseInt(document.getElementById('qrSize').value) || 300;
            const qrcodeDiv = document.getElementById('qrcode');
            const previewDiv = document.getElementById('qrPreview');
            const placeholder = document.getElementById('placeholder');
            
            // Clear previous content
            qrcodeDiv.innerHTML = '';
            placeholder.style.display = 'block';

            // Generate QR code
            new QRCode(qrcodeDiv, {
                text: data,
                width: size,
                height: size,
                colorDark: '#000000',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.H
            });

            // After generation, get the canvas
            setTimeout(() => {
                const canvas = qrcodeDiv.querySelector('canvas');
                if (canvas) {
                    lastQRCanvas = canvas;
                    placeholder.style.display = 'none';
                    previewDiv.classList.add('active');
                    document.getElementById('downloadBtn').classList.add('show');
                    document.getElementById('copyBtn').classList.add('show');
                }
            }, 100);
        }

        function downloadQR() {
            if (!lastQRCanvas) {
                alert('Please generate a QR code first!');
                return;
            }

            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const filename = `${day}-${month}-${year}.png`;

            const link = document.createElement('a');
            link.href = lastQRCanvas.toDataURL('image/png');
            link.download = filename;
            link.click();
        }

        function copyToClipboard() {
            if (!lastQRCanvas) {
                alert('Please generate a QR code first!');
                return;
            }

            lastQRCanvas.toBlob(function(blob) {
                navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]).then(() => {
                    const msg = document.getElementById('successMessage');
                    msg.classList.add('show');
                    setTimeout(() => msg.classList.remove('show'), 2000);
                }).catch(() => {
                    alert('Failed to copy');
                });
            });
        }

        // Type selector
        document.getElementById('inputType').addEventListener('change', function() {
            const input = document.getElementById('inputData');
            if (this.value === 'url') {
                input.placeholder = 'https://example.com';
                input.value = '';
            } else {
                input.placeholder = 'Enter text...';
                input.value = '';
            }
        });

        // Generate QR on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                generateQR();
            }, 200);
        });

        // Allow Ctrl+Enter to generate
        document.getElementById('inputData').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateQR();
            }
        });
    </script>
</body>
</html>
