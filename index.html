<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        .wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .wrapper {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            grid-column: 1 / -1;
        }

        .form-section h2 {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .preview-section h2 {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .size-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .size-row label {
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .size-row input {
            width: 100px;
            margin-bottom: 0;
        }

        .size-row span {
            color: #999;
            flex-shrink: 0;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 20px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-download,
        .btn-copy {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-download:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .btn-copy {
            background: #2196F3;
            color: white;
        }

        .btn-copy:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .btn-copy:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        #qrcode {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            min-height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ddd;
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        .placeholder {
            color: #999;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        .controls {
            display: none;
        }

        .controls.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 QR Code Maker</h1>

        <div class="wrapper">
            <div class="form-section">
                <h2>Create QR Code</h2>

                <div class="form-group">
                    <label for="inputType">Type:</label>
                    <select id="inputType">
                        <option value="text">Text</option>
                        <option value="url">URL/Link</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputData">Content:</label>
                    <textarea id="inputData" placeholder="Enter text or paste a URL..."></textarea>
                </div>

                <div class="form-group">
                    <div class="size-row">
                        <label for="qrSize">Size:</label>
                        <input type="number" id="qrSize" value="300" min="100" max="800">
                        <span>px</span>
                    </div>
                </div>

                <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>
            </div>

            <div class="preview-section">
                <h2>Preview</h2>
                <div id="qrcode">
                    <p class="placeholder">Your QR code will appear here</p>
                </div>
                <div class="controls" id="controls">
                    <div class="button-row">
                        <button class="btn-download" onclick="downloadQR()">⬇️ Download</button>
                        <button class="btn-copy" onclick="copyToClipboard()">📋 Copy</button>
                    </div>
                    <div class="success-message" id="successMessage">Copied to clipboard!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastQRCanvas = null;

        document.getElementById('inputType').addEventListener('change', function() {
            const input = document.getElementById('inputData');
            if (this.value === 'url') {
                input.placeholder = 'https://example.com';
            } else {
                input.placeholder = 'Enter text...';
            }
            input.value = '';
        });

        function generateQR() {
            const data = document.getElementById('inputData').value.trim();
            
            if (!data) {
                alert('Please enter some content!');
                return;
            }

            const size = parseInt(document.getElementById('qrSize').value) || 300;
            const qrcodeDiv = document.getElementById('qrcode');
            
            // Clear previous QR code
            qrcodeDiv.innerHTML = '';

            // Generate new QR code
            new QRCode(qrcodeDiv, {
                text: data,
                width: size,
                height: size,
                colorDark: '#000000',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Store the canvas for download/copy
            setTimeout(() => {
                lastQRCanvas = qrcodeDiv.querySelector('canvas');
                if (lastQRCanvas) {
                    // Show controls
                    document.getElementById('controls').classList.add('show');
                }
            }, 100);
        }

        function downloadQR() {
            if (!lastQRCanvas) {
                alert('Please generate a QR code first!');
                return;
            }

            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const filename = `${day}/${month}/${year}.png`;

            const link = document.createElement('a');
            link.href = lastQRCanvas.toDataURL('image/png');
            link.download = filename;
            link.click();
        }

        function copyToClipboard() {
            if (!lastQRCanvas) {
                alert('Please generate a QR code first!');
                return;
            }

            lastQRCanvas.toBlob(function(blob) {
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard.write([item]).then(() => {
                    const message = document.getElementById('successMessage');
                    message.classList.add('show');
                    setTimeout(() => {
                        message.classList.remove('show');
                    }, 2000);
                }).catch(() => {
                    alert('Failed to copy. Please try downloading instead.');
                });
            });
        }

        // Allow Ctrl+Enter to generate
        document.getElementById('inputData').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateQR();
            }
        });
    </script>
</body>
</html>
